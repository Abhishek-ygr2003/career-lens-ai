name: Daily Rolling Ingestion

on:
  schedule:
    # Run daily at 02:00 UTC (07:30 AM IST)
    - cron: '0 2 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Determine Rolling Domain & Run Ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: |
          # Use Python to evaluate the day of the week and select the domain
          python -c "
          import datetime
          import subprocess
          
          # weekday(): 0 = Monday, ..., 6 = Sunday
          day = datetime.datetime.utcnow().weekday()
          
          domain_map = {
              0: 'Cybersecurity',
              1: 'Software Engineering',
              2: 'Healthcare',
              3: 'Sales & Marketing',
              4: 'Data Science & AI',
              5: 'Software Engineering',
              6: 'Data Science & AI'
          }
          
          domain = domain_map.get(day, 'Data Science & AI')
          print(f'Rolling Ingestion Target Domain: {domain}')
          
          # 1. Run Ingestion for Foundit
          print('--> Ingesting from Foundit...')
          subprocess.run([
              'python', 'run_full_pipeline.py',
              '--source', 'foundit',
              '--domains', domain,
              '--max-pages', '3',
              '--cooldown', '5'
          ], check=True)
          
          # 2. Run Ingestion for Adzuna
          print('--> Ingesting from Adzuna...')
          subprocess.run([
              'python', 'run_full_pipeline.py',
              '--source', 'adzuna',
              '--domains', domain,
              '--max-pages', '3',
              '--cooldown', '5'
          ], check=True)
          
          print('✓ Daily rolling ingestion completed.')
          "
