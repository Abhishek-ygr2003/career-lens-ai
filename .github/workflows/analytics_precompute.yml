name: Daily Precompute & Monthly Archiving

on:
  schedule:
    # Run daily at 00:00 UTC (12:00 AM)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  precompute:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Analytics Precomputations
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python database/precompute_analytics.py

      - name: Run Monthly Archive (First Day of the Month Only)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          # Use Python to evaluate dates platform-independently and run archive if today is the 1st
          python -c "
          from datetime import date, timedelta
          import subprocess
          today = date.today()
          if today.day == 1:
              prev_month = (today - timedelta(days=1)).strftime('%Y-%m')
              print(f'Today is the 1st. Archiving monthly snapshot for: {prev_month}')
              subprocess.run(['python', 'database/archive_snapshots.py', '--month', prev_month], check=True)
          else:
              print('Today is not the 1st of the month. Skipping archive.')
          "
